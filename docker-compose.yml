services:
  app:
    build:
      context: .
    container_name: delivery-service-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Delivery Service"
      APP_ENV: local
      APP_KEY: base64:q7w6P+JD3TQlthJ0CGUwPoHlICjfkAxiRGYnKVgLBVk=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: delivery_service
      DB_USERNAME: delivery_user
      DB_PASSWORD: delivery_password
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "test -f vendor/autoload.php || composer install; php artisan serve --host=0.0.0.0 --port=8000"
    tty: true
    stdin_open: true

  postgres:
    image: postgres:16-alpine
    container_name: delivery-service-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: delivery_service
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_user -d delivery_service"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
